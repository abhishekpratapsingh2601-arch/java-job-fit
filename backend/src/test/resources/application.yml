app:
  cors:
    allowed-origins: "http://localhost:4173"

spring:
  datasource:
    url: "jdbc:h2:mem:javajobfit-test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE"
    username: sa
    password: ""
    driver-class-name: "org.h2.Driver"
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: "org.hibernate.dialect.H2Dialect"
  flyway:
    enabled: true
    baseline-on-migrate: "${SPRING_FLYWAY_BASELINE_ON_MIGRATE:false}"
    clean-disabled: true
    locations: "classpath:db/migration,classpath:db/vendor/{vendor}"
